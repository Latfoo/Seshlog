[pytest]
pythonpath = .
# Suppresses ROS testing plugins that get auto-discovered on machines that have ROS installed.
# These flags are no-ops on machines without ROS, so this file works fine everywhere.
addopts = -p no:launch_ros -p no:launch_testing -p no:ament_flake8 -p no:ament_pep257 -p no:ament_xmllint -p no:ament_lint -p no:ament_copyright --cov=app --cov-report=term-missing
