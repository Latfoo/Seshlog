<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

  <header>
    <div class="header-left">
      <span class="logo">&#127813;</span>
      <h1>Pomodoro</h1>
    </div>
    <div class="header-user" id="header-user" hidden>
      <span class="header-username" id="header-username"></span>
      <button class="btn-logout" id="btn-logout">Log out</button>
    </div>
  </header>

  <main>

    <section class="timer-section">
      <div class="card">

        <!-- <input
          id="task-input"
          class="task-input"
          type="text"
          placeholder="What are you working on? (optional)"
          autocomplete="off"
          maxlength="100"
        > -->

        <div class="timer-wrap">
          <svg viewBox="0 0 200 200" id="timer-svg" aria-hidden="true">
            <circle class="ring-bg"       cx="100" cy="100" r="80" />
            <circle class="ring-progress" cx="100" cy="100" r="80" id="ring-progress" />
          </svg>
          <span class="timer-time" id="timer-time">25:00</span>
        </div>
        <div class="settings-row">
          <div class="field">
            <label for="duration">Duration</label>
            <select id="duration">
              <option value="5">5 min</option>
              <option value="10">10 min</option>
              <option value="15">15 min</option>
              <option value="25" selected>25 min</option>
              <option value="30">30 min</option>
              <option value="45">45 min</option>
              <option value="60">60 min</option>
            </select>
          </div>

          <div class="field">
            <label>Tags</label>
            <div class="tags-wrap" id="tags-wrap">
              <div class="chips" id="chips"></div>
              <input
                id="tag-input"
                type="text"
                placeholder="Add tag…"
                autocomplete="off"
                maxlength="30"
              >
            </div>
          </div>
        </div>

        <div class="controls">
          <button id="btn-start" class="btn primary">Start</button>
          <button id="btn-pause" class="btn secondary" hidden>Pause</button>
          <button id="btn-done"  class="btn success"   hidden>Done</button>
        </div>

      </div>
    </section>

    <div class="right-col">
    <section class="stats-section" id="stats-section">
      <div class="stats-head">
        <div class="stats-title-row">
          <h2>Statistics</h2>
        </div>
        <div class="filters" id="filters"></div>
      </div>

      <span class="stats-sublabel">All time</span>
      <div class="stat-cards">
        <div class="stat-card">
          <span class="stat-value" id="stat-total-minutes">—</span>
          <span class="stat-label">Total minutes</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="stat-total-sessions">—</span>
          <span class="stat-label">Sessions</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="stat-avg-minutes">—</span>
          <span class="stat-label">Avg per session</span>
        </div>
      </div>

      <span class="stats-sublabel" id="stats-period">Last 30 days</span>
      <div class="chart-wrap">
        <svg id="stats-chart" viewBox="0 0 638 90" aria-hidden="true"></svg>
      </div>

    </section>

    <section class="history-section">
      <div class="history-head">
        <h2>Sessions</h2>
      </div>
      <div class="sessions" id="sessions">
        <p class="empty">No sessions yet — start your first Pomodoro!</p>
      </div>
    </section>
    </div>

  </main>

  <!-- Auth modal — shown on load if not logged in -->
  <div class="modal-overlay" id="auth-modal" hidden>
    <div class="modal-card">
      <span class="modal-logo">&#127813;</span>
      <h2 class="modal-title">Pomodoro</h2>

      <div class="modal-tabs">
        <button class="tab-btn active" id="tab-login">Log In</button>
        <button class="tab-btn" id="tab-register">Register</button>
      </div>

      <form id="auth-form">
        <div class="form-field">
          <label for="auth-username">Email</label>
          <input id="auth-username" type="email" autocomplete="email" required />
        </div>
        <div class="form-field">
          <label for="auth-password">Password</label>
          <input id="auth-password" type="password" autocomplete="current-password" required />
        </div>
        <p class="auth-error" id="auth-error"></p>
        <button type="submit" class="btn primary auth-submit" id="auth-submit">Log In</button>
      </form>
    </div>
  </div>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
